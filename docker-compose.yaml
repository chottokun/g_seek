services:
  # Chainlit UI (Recommended)
  chainlit:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    # NOTE: Do NOT mount the entire directory if it contains a local .venv, 
    # as it will override the container's internal .venv.
    # volumes:
    #   - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      # Local Ollama connection from inside container
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: /app/.venv/bin/python -m chainlit run deep_research_project/chainlit_app.py --host 0.0.0.0 --port 8000

  # Streamlit UI
  streamlit:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    # volumes:
    #   - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: /app/.venv/bin/python -m streamlit run deep_research_project/streamlit_app.py --server.address=0.0.0.0 --server.port 8501
  # Example of how to add other services like Ollama if needed
  # ollama:
  #   image: ollama/ollama
  #   volumes:
  #     - ./ollama_data:/root/.ollama
