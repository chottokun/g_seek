services:
  # Chainlit UI (Recommended)
  chainlit:
    build: .
    ports:
      - "${CHAINLIT_PORT:-8000}:${CHAINLIT_PORT:-8000}"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - CHAINLIT_PORT=${CHAINLIT_PORT:-8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: /app/.venv/bin/python -m chainlit run deep_research_project/chainlit_app.py --host 0.0.0.0 --port ${CHAINLIT_PORT:-8000}
